name: microgpt-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install API dependencies
        run: pip install -r api/requirements-dev.txt
      - name: Run API tests
        run: pytest
        working-directory: api
