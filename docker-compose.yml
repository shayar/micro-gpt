services:
  api:
    build: ./api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./api/app:/app/app
    depends_on:
      - qdrant
      - redis
      - searxng

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8081:8080"
    environment:
      - BASE_URL=http://localhost:8081/
      - INSTANCE_NAME=microgpt-searxng

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles: ["inference"]
    command: ["-m", "/models/model.gguf", "--host", "0.0.0.0", "--port", "8080", "-c", "4096", "-t", "4"]
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models

volumes:
  qdrant_storage:
