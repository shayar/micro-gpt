services:
  microgpt-api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      MICROGPT_DATA_DIR: /app/data
      MICROGPT_PUBLIC_ACCESS: "false"
      MICROGPT_MATURITY_LEVEL: research
      MICROGPT_ADMIN_USERNAME: admin
      MICROGPT_ADMIN_PASSWORD: microgpt-admin
      MICROGPT_JWT_SECRET: change-this-local-dev-secret-32bytes-min
    command: bash -lc "pip install -e . && python scripts/init_dev.py && uvicorn microgpt.api.main:app --host 0.0.0.0 --port 8000"
